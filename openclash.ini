############################
# 基础设置
############################
enable_rule_generator=true
overwrite_original_rules=true

# ✅ 修复 base（原来的 ghproxy.yaml 是错的）
clash_rule_base=https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/lite.yaml


############################
# DNS（修复版）
############################
dns=true

custom_dns=127.0.0.1:53

dns_mode=fake-ip

fakeip_range=198.18.0.1/16

fakeip_filter=*.lan,*.local,*.msftconnecttest.com,*.msftncsi.com


############################
# UI优化
############################
add_emoji=true
remove_old_emoji=true


############################
# 代理组（JS等价）
############################

custom_proxy_group=🚀 国外代理`select`[]♻️ 自动选择`[]🌐 手动选择`[]➡️ 直连
custom_proxy_group=🎯 国内代理`select`[]➡️ 直连`[]♻️ 自动选择`[]🌐 手动选择
custom_proxy_group=🐟 漏网之鱼`select`[]♻️ 自动选择`[]🌐 手动选择`[]➡️ 直连

custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,150
custom_proxy_group=🌐 手动选择`select`.*
custom_proxy_group=➡️ 直连`select`DIRECT


