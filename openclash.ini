############################
# 基础设置（必须放最上面）
############################
enable_rule_generator=1
overwrite_original_rules=1

clash_rule_base=https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/lite.yaml


############################
# DNS
############################
dns=true
custom_dns=127.0.0.1:53
dns_mode=fake-ip
fakeip_range=198.18.0.1/16


############################
# 代理组（保留你结构）
############################
