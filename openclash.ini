############################
# 自定义直连节点
############################
custom_proxy=➡️ 直连,direct,,,,

############################
# 策略组配置
############################
custom_proxy_group=🚀 国外代理`select`♻️ 自动选择`🌐 手动选择`➡️ 直连
custom_proxy_group=🎯 国内代理`select`➡️ 直连`♻️ 自动选择`🌐 手动选择
custom_proxy_group=🐟 漏网之鱼`select`♻️ 自动选择`🌐 手动选择`➡️ 直连
custom_proxy_group=♻️ 自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300,150
custom_proxy_group=🌐 手动选择`select`.*

