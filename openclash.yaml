# =========================
# DNS
# =========================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true

  nameserver:
    - tcp://127.0.0.1:5591
    - tcp://[::1]:5591

  default-nameserver:
    - tcp://127.0.0.1:5591
    - tcp://[::1]:5591

  fallback:
    - tcp://127.0.0.1:5591
    - tcp://[::1]:5591

  nameserver-policy: {}

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"

# =========================
# 额外直连节点（JS中的 push）
# =========================
add-proxies:
  - name: "➡️ 直连"
    type: direct
    udp: true
    ip-version: ipv4-prefer
    client-fingerprint: chrome

# =========================
# 代理组（JS完全等价）
# =========================
proxy-groups:

  - name: "🚀 国外代理"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🌐 手动选择"
      - "➡️ 直连"

  - name: "🎯 国内代理"
    type: select
    proxies:
      - "➡️ 直连"
      - "♻️ 自动选择"
      - "🌐 手动选择"

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🌐 手动选择"
      - "➡️ 直连"

  - name: "♻️ 自动选择"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 150

  - name: "🌐 手动选择"
    type: select
    use:
      - default

